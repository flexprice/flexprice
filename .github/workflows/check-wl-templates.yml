# Detects drift between white-label templates and .speakeasy/gen/*.yaml
# Runs only when gen configs or templates change in a PR.
# Keeps templates in sync after Speakeasy CLI auto-bumps gen configs.

name: Check White-Label Templates

on:
  pull_request:
    paths:
      - '.speakeasy/gen/*.yaml'
      - 'configs/white-label/templates/*.tmpl'

permissions:
  contents: read

jobs:
  check-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check templates are in sync
        run: make check-wl-templates
