# Integration journeys — YAML-defined customer workflows executed against
# live Flexprice targets through the published Go SDK.
# See integration-testing-suite/README.md.
#
# Jobs:
#   validate — static checks + engine unit tests + coverage summary.
#              Runs on every PR touching the suite. No secrets needed.
#   run      — executes sanity-tagged journeys against staging.
#              Runs on PRs into main (develop→main promotions: deploy.yml
#              keeps staging deployed from develop, so the release PR is
#              verified against the exact code being promoted), nightly,
#              and on manual dispatch.
name: integration-journeys

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * *" # nightly drift detection against staging
  workflow_dispatch:
    inputs:
      tags:
        description: "Journey tags to run (comma-separated)"
        default: sanity
      parallel:
        description: "Max journeys running concurrently"
        default: "4"

concurrency:
  group: integration-journeys-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate journeys & engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: integration-testing-suite/runner/go.mod
          cache-dependency-path: integration-testing-suite/runner/go.sum

      - name: Engine unit tests
        working-directory: integration-testing-suite/runner
        run: |
          go vet ./...
          go test ./...

      - name: Static journey validation
        working-directory: integration-testing-suite/runner
        run: go run . -dir ../journeys -validate

      - name: SDK coverage summary
        working-directory: integration-testing-suite/runner
        run: go run . -dir ../journeys -coverage >> "$GITHUB_STEP_SUMMARY"

  run:
    name: Run journeys against staging
    needs: validate
    # Release PRs (into main), nightly, and manual runs — not suite-only PRs
    # into other branches.
    if: github.event_name != 'pull_request' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: integration-testing-suite/runner/go.mod
          cache-dependency-path: integration-testing-suite/runner/go.sum

      - name: Check target secret
        id: target
        env:
          TARGETS: ${{ secrets.INTEGRATION_TARGETS_JSON }}
        run: |
          if [ -z "$TARGETS" ]; then
            echo "INTEGRATION_TARGETS_JSON secret is not configured — skipping live run." >> "$GITHUB_STEP_SUMMARY"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run journeys
        if: steps.target.outputs.configured == 'true'
        working-directory: integration-testing-suite/runner
        env:
          FLEXPRICE_TARGETS: ${{ secrets.INTEGRATION_TARGETS_JSON }}
        run: |
          go run . -dir ../journeys \
            -tags "${{ github.event.inputs.tags || 'sanity' }}" \
            -parallel "${{ github.event.inputs.parallel || '4' }}" \
            -report-json report.json -junit junit.xml

      - name: Upload reports
        if: always() && steps.target.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: journey-reports
          path: |
            integration-testing-suite/runner/report.json
            integration-testing-suite/runner/junit.xml
          retention-days: 14
