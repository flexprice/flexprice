name: Publish App Image to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g., v1.0.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/flexprice

jobs:
  build-and-publish:
    name: Build, scan, publish multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Validate: must look like a SemVer tag (v1.2.3, v1.2.3-rc.1, etc.)
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # PAT auth — default GITHUB_TOKEN can't push to the org's GHCR
          # package unless the package is linked to this repo with Write.
          # Override the username via vars.GHCR_USERNAME if the PAT owner
          # differs from the action actor.
          username: ${{ vars.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PUBLISH_TOKEN }}

      - name: Build & push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.semver }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.semver }}
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Trivy vulnerability scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          DIGEST: ${{ steps.build.outputs.digest }}
          IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          {
            echo "## App Image Published"
            echo ""
            echo "- Image: \`${IMG}:${TAG}\`"
            echo "- Platforms: linux/amd64, linux/arm64"
            echo "- Digest: \`${DIGEST}\`"
            echo "- SBOM + provenance: attached"
          } >> "$GITHUB_STEP_SUMMARY"
