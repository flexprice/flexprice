name: Publish Helm Chart to AWS Public ECR

on:
  push:
    branches:
      - main
    paths:
      - 'helm/flexprice/**'
      - '.github/workflows/publish-helm-chart.yml'
    tags:
      - 'chart-v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version override (e.g., 1.0.0). Leave empty to use Chart.yaml version'
        required: false
        type: string
      force:
        description: 'Force push even if version exists'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: us-east-1
  HELM_REGISTRY: oci://public.ecr.aws/l7n1c1i5/flexprice
  HELM_REPOSITORY: helm-charts
  GHCR_HOST: ghcr.io
  GHCR_REPOSITORY: charts

jobs:
  publish-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
        continue-on-error: true

      - name: Login to AWS Public ECR
        id: ecr-login
        run: |
          set -euo pipefail
          echo "Logging into AWS Public ECR..."
          # Public ECR requires us-east-1 region
          if aws ecr-public get-login-password --region us-east-1 | \
             helm registry login --username AWS --password-stdin public.ecr.aws; then
            echo "Successfully logged into AWS Public ECR"
          else
            echo "::warning::Failed to login to AWS Public ECR, continuing anyway"
          fi

      - name: Extract Chart Version
        id: chart-version
        run: |
          set -euo pipefail
          CHART_VERSION=$(grep -E '^version:' helm/flexprice/Chart.yaml | awk '{print $2}' | tr -d '"')
          if [[ "${GITHUB_REF:-}" == refs/tags/chart-v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/chart-v}"
            if [[ "$TAG_VERSION" != "$CHART_VERSION" ]]; then
              echo "❌ Tag chart-v$TAG_VERSION does not match Chart.yaml version $CHART_VERSION"
              exit 1
            fi
            echo "version=$CHART_VERSION" >> "$GITHUB_OUTPUT"
            echo "trigger=chart-tag" >> "$GITHUB_OUTPUT"
            echo "Chart version (chart-tag): $CHART_VERSION"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "trigger=manual" >> "$GITHUB_OUTPUT"
            echo "Chart version (manual): ${{ github.event.inputs.version }}"
          else
            echo "version=$CHART_VERSION" >> "$GITHUB_OUTPUT"
            echo "trigger=branch-or-app" >> "$GITHUB_OUTPUT"
            echo "Chart version (branch-or-app): $CHART_VERSION"
          fi

      - name: Extract Chart Name
        id: chart-name
        run: |
          CHART_NAME=$(helm show chart helm/flexprice | grep '^name:' | awk '{print $2}' | tr -d '"' || echo "flexprice")
          echo "name=$CHART_NAME" >> $GITHUB_OUTPUT
          echo "Chart name: $CHART_NAME"

      - name: Check if chart version changed
        id: changed
        run: |
          set -euo pipefail
          TRIGGER="${{ steps.chart-version.outputs.trigger }}"
          # chart-tag and manual triggers always publish — no diff check needed.
          if [[ "$TRIGGER" == "chart-tag" || "$TRIGGER" == "manual" ]]; then
            echo "Trigger is '$TRIGGER' — unconditionally publishing"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV=$(git show HEAD^:helm/flexprice/Chart.yaml 2>/dev/null | grep -E '^version:' | awk '{print $2}' | tr -d '"' || echo "")
          else
            PREV=""
          fi
          if [[ "$PREV" == "${{ steps.chart-version.outputs.version }}" ]]; then
            echo "Chart version unchanged ($PREV) — skipping publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Chart version changed: $PREV → ${{ steps.chart-version.outputs.version }}"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint Helm Chart
        run: |
          helm lint helm/flexprice --set secrets.existingSecret=test
          helm template flexprice-test helm/flexprice --set secrets.existingSecret=test --debug

      - name: Package Helm Chart
        if: ${{ steps.changed.outputs.publish == 'true' }}
        run: |
          helm package helm/flexprice --version ${{ steps.chart-version.outputs.version }}

      - name: Check if version already exists
        id: version-check
        if: ${{ steps.changed.outputs.publish == 'true' && github.event.inputs.force != 'true' }}
        run: |
          CHART_NAME="${{ steps.chart-name.outputs.name }}"
          CHART_VERSION="${{ steps.chart-version.outputs.version }}"
          
          # Try to fetch the chart version from ECR
          if helm show chart ${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }}:${{ steps.chart-version.outputs.version }} 2>/dev/null | grep -q "version: $CHART_VERSION"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::warning::Chart version $CHART_VERSION already exists in registry"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Chart version $CHART_VERSION does not exist, proceeding with publish"
          fi
        continue-on-error: true

      - name: Push Helm Chart to AWS Public ECR
        if: ${{ steps.changed.outputs.publish == 'true' && (steps.version-check.outputs.exists != 'true' || github.event.inputs.force == 'true') }}
        run: |
          CHART_NAME="${{ steps.chart-name.outputs.name }}"
          CHART_VERSION="${{ steps.chart-version.outputs.version }}"
          CHART_FILE="${CHART_NAME}-${CHART_VERSION}.tgz"
          
          echo "Pushing chart: $CHART_FILE"
          
          # Push to OCI registry
          helm push $CHART_FILE ${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }} || \
          helm push $CHART_FILE oci://${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }}
          
          echo "::notice::Successfully published $CHART_NAME:$CHART_VERSION to ${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }}"
          
          # Output for summary
          echo "CHART_URL=${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }}:$CHART_VERSION" >> $GITHUB_ENV

      - name: Login to GHCR
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/chart-v') }}
        env:
          # PAT auth — see comment in publish-app-image.yml. Override the
          # username via vars.GHCR_USERNAME if the PAT owner differs from
          # the action actor.
          GH_TOKEN: ${{ secrets.GHCR_PUBLISH_TOKEN }}
          GH_USER: ${{ vars.GHCR_USERNAME || github.actor }}
          GHCR_HOST: ${{ env.GHCR_HOST }}
        run: |
          echo "$GH_TOKEN" | helm registry login "$GHCR_HOST" -u "$GH_USER" --password-stdin

      - name: Push Helm Chart to GHCR
        if: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/chart-v')) && (steps.version-check.outputs.exists != 'true' || github.event.inputs.force == 'true') }}
        env:
          CHART_NAME: ${{ steps.chart-name.outputs.name }}
          CHART_VERSION: ${{ steps.chart-version.outputs.version }}
          OWNER: ${{ github.repository_owner }}
          GHCR_HOST: ${{ env.GHCR_HOST }}
          GHCR_REPOSITORY: ${{ env.GHCR_REPOSITORY }}
        run: |
          CHART_FILE="${CHART_NAME}-${CHART_VERSION}.tgz"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          TARGET="oci://${GHCR_HOST}/${OWNER_LC}/${GHCR_REPOSITORY}"
          echo "Pushing $CHART_FILE to $TARGET"
          helm push "$CHART_FILE" "$TARGET"
          echo "::notice::Published $CHART_NAME:$CHART_VERSION to $TARGET"

      - name: Verify Published Chart (ECR)
        if: ${{ steps.changed.outputs.publish == 'true' && (steps.version-check.outputs.exists != 'true' || github.event.inputs.force == 'true') }}
        run: |
          helm show chart ${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }}:${{ steps.chart-version.outputs.version }} || \
          helm show chart oci://${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }}:${{ steps.chart-version.outputs.version }}

      - name: Verify Published Chart (GHCR)
        if: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/chart-v')) && (steps.version-check.outputs.exists != 'true' || github.event.inputs.force == 'true') }}
        env:
          CHART_NAME: ${{ steps.chart-name.outputs.name }}
          CHART_VERSION: ${{ steps.chart-version.outputs.version }}
          OWNER: ${{ github.repository_owner }}
          GHCR_HOST: ${{ env.GHCR_HOST }}
          GHCR_REPOSITORY: ${{ env.GHCR_REPOSITORY }}
        run: |
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          helm show chart "oci://${GHCR_HOST}/${OWNER_LC}/${GHCR_REPOSITORY}/${CHART_NAME}" --version "$CHART_VERSION"

      - name: Create Summary
        if: always()
        run: |
          echo "## Helm Chart Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Chart Name**: ${{ steps.chart-name.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Chart Version**: ${{ steps.chart-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.version-check.outputs.exists }}" == "true" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "- **Status**: ⚠️ Version already exists (skipped)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.version-check.outputs.exists }}" != "true" ] || [ "${{ github.event.inputs.force }}" == "true" ]; then
            echo "- **Status**: ✅ Published successfully" >> $GITHUB_STEP_SUMMARY
            echo "- **Chart URL**: \`helm pull oci://${{ env.HELM_REGISTRY }}/${{ env.HELM_REPOSITORY }}:${{ steps.chart-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Chart Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-${{ steps.chart-version.outputs.version }}
          path: ${{ steps.chart-name.outputs.name }}-${{ steps.chart-version.outputs.version }}.tgz
          retention-days: 30

