{{/*
The chart only renders this Secret when secrets.existingSecret is empty.
This is a DEVELOPMENT fallback — values are plaintext in values.yaml.

For production, create a Secret out-of-band and set secrets.existingSecret
to its name. See README "Secrets management" section for required keys.
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flexprice.fullname" . }}-secrets
  labels:
    {{- include "flexprice.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ required "secrets.existingSecret not set and postgres.password is empty — set one of them" .Values.postgres.password | quote }}
  clickhouse-password: {{ required "secrets.existingSecret not set and clickhouse.password is empty — set one of them" .Values.clickhouse.password | quote }}
  auth-secret: {{ required "secrets.existingSecret not set and auth.secret is empty — set one of them" .Values.auth.secret | quote }}
  encryption-key: {{ required "secrets.existingSecret not set and secrets.encryptionKey is empty — set one of them" .Values.secrets.encryptionKey | quote }}
  {{- if and (eq .Values.auth.provider "supabase") .Values.auth.supabase.serviceKey }}
  supabase-service-key: {{ .Values.auth.supabase.serviceKey | quote }}
  {{- end }}
  {{- if and .Values.kafkaConfig.useSASL .Values.kafkaConfig.saslPassword }}
  kafka-sasl-password: {{ .Values.kafkaConfig.saslPassword | quote }}
  {{- end }}
  {{- if .Values.redisConfig.password }}
  redis-password: {{ .Values.redisConfig.password | quote }}
  {{- end }}
  {{- if .Values.temporalConfig.apiKey }}
  temporal-api-key: {{ .Values.temporalConfig.apiKey | quote }}
  {{- end }}
  {{- if and .Values.sentry.enabled .Values.sentry.dsn }}
  sentry-dsn: {{ .Values.sentry.dsn | quote }}
  {{- end }}
  {{- if and .Values.pyroscope.enabled .Values.pyroscope.basicAuthPassword }}
  pyroscope-basic-auth-password: {{ .Values.pyroscope.basicAuthPassword | quote }}
  {{- end }}
  {{- if and .Values.email.enabled .Values.email.resendApiKey }}
  email-resend-api-key: {{ .Values.email.resendApiKey | quote }}
  {{- end }}
  {{- if and .Values.webhook.enabled .Values.webhook.svixConfig.enabled .Values.webhook.svixConfig.authToken }}
  svix-auth-token: {{ .Values.webhook.svixConfig.authToken | quote }}
  {{- end }}
  {{- if and .Values.logging.otel.enabled .Values.logging.otel.authValue }}
  logging-otel-auth-value: {{ .Values.logging.otel.authValue | quote }}
  {{- end }}
{{- end }}
