{{- /* Hand-rolled Redis — only rendered when external is disabled AND bitnami subchart is disabled */}}
{{- if and (not .Values.redisConfig.external.enabled) (not .Values.redisConfig.enabled) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flexprice.fullname" . }}-redis
  labels:
    {{- include "flexprice.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    {{- include "flexprice.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "flexprice.fullname" . }}-redis
  labels:
    {{- include "flexprice.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "flexprice.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "flexprice.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "flexprice.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      containers:
        - name: redis
          image: "{{ .Values.redisConfig.internal.image.repository }}:{{ .Values.redisConfig.internal.image.tag }}"
          imagePullPolicy: {{ .Values.redisConfig.internal.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          {{- if .Values.redisConfig.password }}
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "flexprice.secretName" . }}
                  key: redis-password
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.redisConfig.internal.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  {{- if .Values.redisConfig.internal.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.redisConfig.internal.persistence.storageClass }}
        storageClassName: {{ .Values.redisConfig.internal.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redisConfig.internal.persistence.size }}
  {{- end }}
{{- end }}
