{{- if .Values.consumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flexprice.fullname" . }}-consumer
  labels:
    {{- include "flexprice.labels" . | nindent 4 }}
    app.kubernetes.io/component: consumer
spec:
  replicas: {{ .Values.consumer.replicaCount }}
  {{- with .Values.consumer.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "flexprice.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: consumer
  template:
    metadata:
      annotations:
        checksum/config: {{ include "flexprice/templates/app/configmap.yaml" . | sha256sum }}
        checksum/secret: {{ include "flexprice/templates/app/secret.yaml" . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "flexprice.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: consumer
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flexprice.componentServiceAccountName" (dict "ctx" . "component" "consumer") }}
      {{- with .Values.consumer.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /app
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- include "flexprice.env" . | nindent 12 }}
            - name: FLEXPRICE_DEPLOYMENT_MODE
              value: "consumer"
            - name: TMPDIR
              value: "/tmp"
            {{- /* consumer-only env overrides — rendered AFTER flexprice.env so these
                   win over the global .Values.extraEnv for duplicate keys (k8s last-wins).
                   Used for settings that differ on the consumer vs api/worker, e.g.
                   FLEXPRICE_CACHE_ENABLED (cache is on for the consumer only). */}}
            {{- with .Values.consumer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if and .Values.consumer.preStop .Values.consumer.preStop.enabled }}
          lifecycle:
            preStop:
              exec:
                # Give endpoints controller time to drop this pod before the
                # Kafka consumer-group rebalance kicks off the new owner.
                command: ["/bin/sh", "-c", "sleep {{ .Values.consumer.preStop.sleepSeconds | default 15 }}"]
          {{- end }}
          # No HTTP probes: this runs in deployment.mode=consumer and serves no HTTP
          # server, so an httpGet /health probe always fails and crashloops the pod.
          # No Service routes to it either, so readiness is moot. (Matches the AWS ECS
          # consumer, which runs with no health checks.)
          resources:
            {{- toYaml .Values.consumer.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "flexprice.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with (default .Values.nodeSelector .Values.consumer.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.affinity .Values.consumer.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.tolerations .Values.consumer.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $tsc := default .Values.topologySpreadConstraints .Values.consumer.topologySpreadConstraints }}
      {{- if $tsc }}
      topologySpreadConstraints:
        {{- toYaml $tsc | nindent 8 }}
      {{- end }}
{{- end }}

