{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flexprice.fullname" . }}-worker
  labels:
    {{- include "flexprice.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  {{- with .Values.worker.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "flexprice.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        {{- if not .Values.env }}
        checksum/config: {{ include "flexprice/templates/app/configmap.yaml" . | sha256sum }}
        {{- end }}
        checksum/secret: {{ include "flexprice/templates/app/secret.yaml" . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "flexprice.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flexprice.componentServiceAccountName" (dict "ctx" . "component" "worker") }}
      {{- with .Values.worker.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /app
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- include "flexprice.env" . | nindent 12 }}
            - name: FLEXPRICE_DEPLOYMENT_MODE
              value: "temporal_worker"
            - name: TMPDIR
              value: "/tmp"
          {{- if and .Values.worker.preStop .Values.worker.preStop.enabled }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.worker.preStop.sleepSeconds | default 0 }}"]
          {{- end }}
          # No HTTP probes: this runs in deployment.mode=temporal_worker and serves no
          # HTTP server, so an httpGet /health probe always fails and crashloops the pod.
          # No Service routes to it either, so readiness is moot. (Matches the AWS ECS
          # worker, which runs with no health checks.)
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            {{- if not .Values.env }}
            - name: config
              mountPath: /app/config/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if not .Values.env }}
        - name: config
          configMap:
            name: {{ include "flexprice.fullname" . }}-config
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with (default .Values.nodeSelector .Values.worker.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.affinity .Values.worker.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.tolerations .Values.worker.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $tsc := default .Values.topologySpreadConstraints .Values.worker.topologySpreadConstraints }}
      {{- if $tsc }}
      topologySpreadConstraints:
        {{- toYaml $tsc | nindent 8 }}
      {{- end }}
{{- end }}

