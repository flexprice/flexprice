{{- if .Values.serviceAccount.create -}}
{{- if .Values.serviceAccount.perComponent -}}
{{- /* One ServiceAccount per workload (api, consumer, worker). Lets operators
       scope IRSA / Workload Identity per component. */ -}}
{{- range $component := list "api" "consumer" "worker" }}
{{- $compCfg := index $.Values $component }}
{{- if $compCfg.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flexprice.componentServiceAccountName" (dict "ctx" $ "component" $component) }}
  labels:
    {{- include "flexprice.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  {{- $compAnnotations := dig "components" $component "annotations" dict $.Values.serviceAccount }}
  {{- $effective := merge (dict) $compAnnotations $.Values.serviceAccount.annotations }}
  {{- if $effective }}
  annotations:
    {{- toYaml $effective | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- else -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flexprice.serviceAccountName" . }}
  labels:
    {{- include "flexprice.labels" . | nindent 4 }}
  annotations:
    # pre-install/pre-upgrade hook (weight -10, ahead of the migration job at -5)
    # so the migration hook, which runs as this ServiceAccount, can create its pod
    # on a fresh install. Without it `helm install` fails with
    # `error looking up service account <ns>/<sa>: serviceaccount not found`.
    # Persists (before-hook-creation only) for the long-lived app Deployments.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
{{- end -}}
