{{- if .Values.serviceAccount.create -}}
{{- if .Values.serviceAccount.perComponent -}}
{{- /* One ServiceAccount per workload (api, consumer, worker). Lets operators
       scope IRSA / Workload Identity per component. */ -}}
{{- range $component := list "api" "consumer" "worker" }}
{{- $compCfg := index $.Values $component }}
{{- if $compCfg.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flexprice.componentServiceAccountName" (dict "ctx" $ "component" $component) }}
  labels:
    {{- include "flexprice.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  {{- $compAnnotations := dig "components" $component "annotations" dict $.Values.serviceAccount }}
  {{- $effective := merge (dict) $compAnnotations $.Values.serviceAccount.annotations }}
  {{- if $effective }}
  annotations:
    {{- toYaml $effective | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- else -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flexprice.serviceAccountName" . }}
  labels:
    {{- include "flexprice.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}
{{- end -}}
